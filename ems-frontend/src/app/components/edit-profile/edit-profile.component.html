

<div class="edit-wrapper">

  <div class="edit-card">

    <h2>Edit Profile</h2>

    <div class="form-group">
      <label>Name</label>
      <input type="text" [(ngModel)]="employee.name" placeholder="Enter your name">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="employee.email" placeholder="Enter your email">
    </div>

    <button class="primary-btn" (click)="updateProfile()">
      Update Profile
    </button>

    <hr>

    
    <button class="secondary-btn" (click)="togglePasswordForm()">
      {{ showPasswordForm ? 'Cancel' : 'Change Password' }}
    </button>

    <div *ngIf="showPasswordForm" class="password-section">

      <h3>Change Password</h3>
      <div class="form-group">
    <label>Current Password</label>

     <input 
      [type]="showCurrentPassword ? 'text' : 'password'" 
      [(ngModel)]="currentPassword"
      class="input-box">

     <div class="show-pass">
  <label>
    <input type="checkbox" [(ngModel)]="showCurrentPassword">
    Show Password
  </label>
</div>
    </div>


    <div class="form-group">
  <label>New Password</label>

  <input 
    [type]="showNewPassword ? 'text' : 'password'" 
    [(ngModel)]="newPassword"
    class="input-box">

  <div class="show-pass">
  <label>
    <input type="checkbox" [(ngModel)]="showNewPassword">
    Show Password
  </label>
</div>
</div>


<div class="form-group">
  <label>Confirm Password</label>

  <input 
    [type]="showConfirmPassword ? 'text' : 'password'" 
    [(ngModel)]="confirmPassword"
    class="input-box">

  <div class="show-pass">
  <label>
    <input type="checkbox" [(ngModel)]="showConfirmPassword">
    Show Password
  </label>
</div>
</div>
     
   
        

      <button class="primary-btn" (click)="changePassword()">
        Submit
      </button>

    </div>

  </div>

</div>
