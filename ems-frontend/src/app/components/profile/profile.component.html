 <div class="container">
  

  <div class="profile-card" *ngIf="employee?.name">

    <!--  HEADER -->
    <div class="profile-header">
      <h4>HELLO EMPLOYEE</h4>
      <div class="avatar">
        {{ employee.name?.charAt(0) }}
      </div>
      <h2>{{ employee.name }}</h2>
      <p class="role">{{ employee.role }}</p>
    </div>

  
    <div class="profile-details">
      <p><strong>Email:</strong> {{ employee.email }}</p>
      <p><strong>Department:</strong> {{ employee.department }}</p>
    </div>

   
    <button class="edit-btn" (click)="goToEdit()">✏ Edit Profile</button>

  

    <div class="attendance-section" *ngIf ="role !== 'MANAGER'">
      <h3> My Attendance</h3>

      <table *ngIf="attendanceList.length > 0">
        <thead>
          <tr>
            <th>Date</th>
            <th>Status</th>
            <th>Check In</th>
            <th>Check Out</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let a of attendanceList">
            <td>{{a.date}}</td>
            <td [ngClass]="a.status === 'PRESENT' ? 'present' : 'absent'">
              {{a.status}}
            </td>
            <td>{{a.checkIn || '-'}}</td>
            <td>{{a.checkOut || '-'}}</td>
          </tr>
        </tbody>
      </table>

      <p *ngIf="attendanceList.length === 0" class="no-data">
        No attendance records
      </p>
    </div>

  </div>

</div>
