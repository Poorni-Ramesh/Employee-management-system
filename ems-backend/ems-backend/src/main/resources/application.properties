# ── Database ──────────────────────────────────────────────
spring.datasource.url=${MYSQL_URL:${DATABASE_URL:jdbc:mysql://localhost:3306/ems?useSSL=false&allowPublicKeyRetrieval=true}}
spring.datasource.username=${MYSQLUSER:${DATABASE_USERNAME:root}}
spring.datasource.password=${MYSQLPASSWORD:${DATABASE_PASSWORD:root}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# ── JPA / Hibernate ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Server ───────────────────────────────────────────────
server.port=${PORT:8080}

# ── CORS ─────────────────────────────────────────────────
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}